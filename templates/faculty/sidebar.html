<!-- FACULTY SIDEBAR -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 z-40 flex flex-col -translate-x-full lg:translate-x-0 shadow-xl lg:shadow-none">
  <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-200 dark:border-slate-700">
    <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-purple-600 rounded-xl flex items-center justify-center shadow">
      <i class="fas fa-graduation-cap text-white text-sm"></i>
    </div>
    <div>
      <h1 class="text-base font-extrabold text-slate-800 dark:text-white leading-none">EduFlow</h1>
      <span class="text-[10px] font-semibold text-violet-500 uppercase tracking-widest">Faculty</span>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
    <p class="px-3 pt-2 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Overview</p>
    <a href="{{ url_for('faculty.dashboard') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if request.endpoint=='faculty.dashboard' %}active{% endif %}">
      <i class="fas fa-gauge-high w-5 text-center text-slate-400"></i>Dashboard
    </a>
    <a href="{{ url_for('faculty.profile') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if request.endpoint=='faculty.profile' %}active{% endif %}">
      <i class="fas fa-user-circle w-5 text-center text-slate-400"></i>My Profile
    </a>

    <p class="px-3 pt-4 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Teaching</p>
    <a href="{{ url_for('faculty.courses') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if 'faculty.course' in request.endpoint %}active{% endif %}">
      <i class="fas fa-book-open w-5 text-center text-slate-400"></i>My Courses
    </a>
    <a href="{{ url_for('faculty.live_classes') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if request.endpoint=='faculty.live_classes' %}active{% endif %}">
      <i class="fas fa-video w-5 text-center text-slate-400"></i>Live Classes
    </a>
    <a href="{{ url_for('faculty.lectures') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if request.endpoint=='faculty.lectures' %}active{% endif %}">
      <i class="fas fa-film w-5 text-center text-slate-400"></i>Recorded Lectures
    </a>

    <p class="px-3 pt-4 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Assessments</p>
    <a href="{{ url_for('faculty.exams') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if 'faculty.exam' in request.endpoint %}active{% endif %}">
      <i class="fas fa-file-pen w-5 text-center text-slate-400"></i>Exams
    </a>
    <a href="{{ url_for('faculty.attendance') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if 'faculty.attendance' in request.endpoint %}active{% endif %}">
      <i class="fas fa-calendar-check w-5 text-center text-slate-400"></i>Attendance
    </a>
    <a href="{{ url_for('faculty.students') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if request.endpoint=='faculty.students' %}active{% endif %}">
      <i class="fas fa-users w-5 text-center text-slate-400"></i>My Students
    </a>
    <a href="{{ url_for('faculty.notifications') }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 {% if request.endpoint=='faculty.notifications' %}active{% endif %}">
      <i class="fas fa-bell w-5 text-center text-slate-400"></i>Notifications
    </a>
  </nav>

  <div class="px-4 py-4 border-t border-slate-200 dark:border-slate-700">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-400 to-purple-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">{{ current_user.name[0].upper() }}</div>
      <div class="min-w-0">
        <p class="text-sm font-semibold text-slate-700 dark:text-slate-200 truncate">{{ current_user.name }}</p>
        <p class="text-xs text-slate-400 truncate">{{ current_user.faculty_id }}</p>
      </div>
    </div>
  </div>
</aside>
