<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — EduFlow LMS</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='.9em' font-size='70' x='50%' dominant-baseline='middle' text-anchor='middle'>🎓</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['"Plus Jakarta Sans"','ui-sans-serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center p-4 transition-colors">

<div class="fixed top-4 right-4">
  <button onclick="toggleTheme()" class="p-3 bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400">
    <i class="fas fa-sun dark:hidden"></i><i class="fas fa-moon hidden dark:block"></i>
  </button>
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 space-y-2 w-full max-w-md px-4">
  {% for category, message in messages %}
  <div class="px-4 py-3 rounded-xl text-sm font-medium border {% if category=='error' %}bg-red-50 border-red-200 text-red-700{% elif category=='success' %}bg-emerald-50 border-emerald-200 text-emerald-700{% else %}bg-blue-50 border-blue-200 text-blue-700{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="w-full max-w-md">
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-lg overflow-hidden">
    <div class="bg-gradient-to-br from-amber-400 to-orange-500 px-8 py-8 text-center text-white">
      <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur">
        <i class="fas fa-key text-3xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold mb-1">Forgot Password?</h1>
      <p class="text-amber-100 text-sm">Submit a request and admin will reset your credentials</p>
    </div>

    <form method="POST" class="p-8 space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">I am a <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="role" value="student" class="hidden peer" required>
            <span class="block text-center py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 text-sm font-semibold text-slate-500 peer-checked:border-emerald-500 peer-checked:text-emerald-600 peer-checked:bg-emerald-50 dark:peer-checked:bg-emerald-900/20 transition-all">
              <i class="fas fa-user-graduate block text-lg mb-1"></i>Student
            </span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="role" value="faculty" class="hidden peer">
            <span class="block text-center py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 text-sm font-semibold text-slate-500 peer-checked:border-violet-500 peer-checked:text-violet-600 peer-checked:bg-violet-50 dark:peer-checked:bg-violet-900/20 transition-all">
              <i class="fas fa-chalkboard-teacher block text-lg mb-1"></i>Faculty
            </span>
          </label>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Registered Email <span class="text-red-500">*</span></label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input type="email" name="email" required placeholder="your@email.com"
            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/30">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Message (Optional)</label>
        <textarea name="message" rows="3" placeholder="Any additional info for the admin…"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/30 resize-none"></textarea>
      </div>

      <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl font-semibold text-sm shadow hover:opacity-90 transition-all">
        <i class="fas fa-paper-plane mr-2"></i>Submit Reset Request
      </button>
    </form>

    <div class="px-8 pb-6 text-center">
      <a href="{{ url_for('auth.select_login') }}" class="text-sm text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">← Back to login selection</a>
    </div>
  </div>
</div>

<script>
  function getTheme(){return localStorage.getItem('theme')||'light';}
  function applyTheme(t){document.documentElement.classList.toggle('dark',t==='dark');localStorage.setItem('theme',t);}
  function toggleTheme(){applyTheme(getTheme()==='dark'?'light':'dark');}
  applyTheme(getTheme());
</script>
</body>
</html>
