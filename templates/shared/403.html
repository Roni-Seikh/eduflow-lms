<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>403 — Forbidden</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='.9em' font-size='70' x='50%' dominant-baseline='middle' text-anchor='middle'>🎓</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="text-center">
  <div class="text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 mb-4">403</div>
  <h1 class="text-2xl font-bold text-slate-700 dark:text-slate-200 mb-2">Access Forbidden</h1>
  <p class="text-slate-400 mb-8">You don't have permission to access this page.</p>
  <a href="/" class="px-6 py-3 bg-primary-500 hover:bg-primary-600 text-white rounded-xl font-semibold transition-colors">
    <i class="fas fa-home mr-2"></i>Go Home
  </a>
</div>
<script>(function(){const t=localStorage.getItem('theme')||'light';document.documentElement.classList.toggle('dark',t==='dark');})();</script>
</body>
</html>
